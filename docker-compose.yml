services:
  dashboard:
    image: asia-southeast1-docker.pkg.dev/keen-frame-487200-c3/openclaw-fleet/dashboard:latest
    env_file: .env
    extra_hosts:
      - "metadata.google.internal:169.254.169.254"
    environment:
      - BACKUP_BUCKET=${BACKUP_BUCKET:-}
      - BACKUP_INTERVAL_MIN=${BACKUP_INTERVAL_MIN:-15}
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
